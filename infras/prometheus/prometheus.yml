global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8000

  - job_name: docker
    static_configs:
      - targets:
          - docker-exporter:9104

  - job_name: nginx
    static_configs:
      - targets:
          - nginx-exporter:9113

  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121

  - job_name: rabbitmq
    static_configs:
      - targets:
          - rabbitmq:15692

  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets:
          - minio:9000

  - job_name: milvus
    metrics_path: /metrics
    static_configs:
      - targets:
          - milvus:9091

  - job_name: etcd
    metrics_path: /metrics
    static_configs:
      - targets:
          - etcd:2379
