services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${APP_BIND_IP:?APP_BIND_IP is required}:${NGINX_PORT:?NGINX_PORT is required}:80"
    volumes:
      - ./infras/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - public
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_NAME: "${APP_NAME:-Omnicall API}"
      APP_ENV: "${APP_ENV:-local}"
      API_PREFIX: "${API_PREFIX:-/api}"
      CORS_ORIGINS: "${CORS_ORIGINS:-[]}"
      POSTGRES_HOST: "${POSTGRES_HOST:-postgres}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB is required}"
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER is required}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      REDIS_HOST: "${REDIS_HOST:-redis}"
      REDIS_PORT: "${REDIS_PORT:-6379}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
      REDIS_PROCESSING_LOCK_TTL_SECONDS: "${REDIS_PROCESSING_LOCK_TTL_SECONDS:-900}"
      RABBITMQ_HOST: "${RABBITMQ_HOST:-rabbitmq}"
      RABBITMQ_PORT: "${RABBITMQ_PORT:-5672}"
      RABBITMQ_USER: "${RABBITMQ_USER:?RABBITMQ_USER is required}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}"
      MINIO_HOST: "${MINIO_HOST:-minio}"
      MINIO_PORT: "${MINIO_PORT:-9000}"
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}"
      MINIO_BUCKET: "${MINIO_BUCKET:?MINIO_BUCKET is required}"
      MINIO_SECURE: "${MINIO_SECURE:-false}"
      MILVUS_HOST: "${MILVUS_HOST:-milvus}"
      MILVUS_PORT: "${MILVUS_PORT:-19530}"
      MILVUS_COLLECTION: "${MILVUS_COLLECTION:-meeting_chunks}"
      VECTOR_PROVIDER: "${VECTOR_PROVIDER:-milvus}"
      UPLOAD_MAX_BYTES: "${UPLOAD_MAX_BYTES:-524288000}"
      UPLOAD_ALLOWED_EXTENSIONS: "${UPLOAD_ALLOWED_EXTENSIONS:-[\".aac\",\".m4a\",\".mp3\",\".mp4\",\".wav\",\".webm\",\".txt\",\".md\",\".vtt\",\".srt\"]}"
      UPLOAD_ALLOWED_CONTENT_TYPES: "${UPLOAD_ALLOWED_CONTENT_TYPES:-[\"audio/aac\",\"audio/m4a\",\"audio/mpeg\",\"audio/mp4\",\"audio/wav\",\"audio/webm\",\"video/mp4\",\"video/webm\",\"text/plain\",\"text/markdown\",\"text/vtt\",\"application/x-subrip\"]}"
      PROMETHEUS_URL: "${PROMETHEUS_URL:-http://prometheus:9090}"
      ADMIN_METRICS_CACHE_KEY: "${ADMIN_METRICS_CACHE_KEY:-admin:metrics:snapshot}"
      ADMIN_METRICS_CACHE_TTL_SECONDS: "${ADMIN_METRICS_CACHE_TTL_SECONDS:-10}"
      ASR_PROVIDER: "${ASR_PROVIDER:-local}"
      SPEAKER_EMBEDDING_PROVIDER: "${SPEAKER_EMBEDDING_PROVIDER:-wespeaker}"
      ANALYSIS_PROVIDER: "${ANALYSIS_PROVIDER:-local}"
      TEXT_EMBEDDING_PROVIDER: "${TEXT_EMBEDDING_PROVIDER:-local}"
      EMBEDDING_DIMENSIONS: "${EMBEDDING_DIMENSIONS:-64}"
      RERANK_PROVIDER: "${RERANK_PROVIDER:-local}"
      LLM_PROVIDER: "${LLM_PROVIDER:-endpoint}"
      LLM_API_BASE_URL: "${LLM_API_BASE_URL:-http://localhost:8001/v1}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-}"
      LLM_ENDPOINT_COMPATIBILITY: "${LLM_ENDPOINT_COMPATIBILITY:-openai}"
      LLM_TIMEOUT_SECONDS: "${LLM_TIMEOUT_SECONDS:-60}"
      LLM_MAX_RETRIES: "${LLM_MAX_RETRIES:-1}"
      LLM_RETRY_BACKOFF_SECONDS: "${LLM_RETRY_BACKOFF_SECONDS:-0.2}"
      LLM_FALLBACK_PROVIDER: "${LLM_FALLBACK_PROVIDER:-ollama}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen2.5:3b}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      TZ: "${TZ:-Asia/Ho_Chi_Minh}"
    expose:
      - "8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import json,urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8000/api/health')); assert data['status']=='ok'\""
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command:
      [
        "celery",
        "-A",
        "backend.configs.celery_app.celery_app",
        "worker",
        "--loglevel=INFO",
        "--queues=meeting-processing",
        "--concurrency=1",
        "--hostname=worker@%h",
        "--without-gossip",
        "--without-mingle"
      ]
    environment:
      APP_NAME: "${APP_NAME:-Omnicall API}"
      APP_ENV: "${APP_ENV:-local}"
      API_PREFIX: "${API_PREFIX:-/api}"
      CORS_ORIGINS: "${CORS_ORIGINS:-[]}"
      POSTGRES_HOST: "${POSTGRES_HOST:-postgres}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB is required}"
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER is required}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      REDIS_HOST: "${REDIS_HOST:-redis}"
      REDIS_PORT: "${REDIS_PORT:-6379}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
      REDIS_PROCESSING_LOCK_TTL_SECONDS: "${REDIS_PROCESSING_LOCK_TTL_SECONDS:-900}"
      RABBITMQ_HOST: "${RABBITMQ_HOST:-rabbitmq}"
      RABBITMQ_PORT: "${RABBITMQ_PORT:-5672}"
      RABBITMQ_USER: "${RABBITMQ_USER:?RABBITMQ_USER is required}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}"
      MINIO_HOST: "${MINIO_HOST:-minio}"
      MINIO_PORT: "${MINIO_PORT:-9000}"
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}"
      MINIO_BUCKET: "${MINIO_BUCKET:?MINIO_BUCKET is required}"
      MINIO_SECURE: "${MINIO_SECURE:-false}"
      MILVUS_HOST: "${MILVUS_HOST:-milvus}"
      MILVUS_PORT: "${MILVUS_PORT:-19530}"
      MILVUS_COLLECTION: "${MILVUS_COLLECTION:-meeting_chunks}"
      VECTOR_PROVIDER: "${VECTOR_PROVIDER:-milvus}"
      ASR_PROVIDER: "${ASR_PROVIDER:-local}"
      SPEAKER_EMBEDDING_PROVIDER: "${SPEAKER_EMBEDDING_PROVIDER:-wespeaker}"
      ANALYSIS_PROVIDER: "${ANALYSIS_PROVIDER:-local}"
      TEXT_EMBEDDING_PROVIDER: "${TEXT_EMBEDDING_PROVIDER:-local}"
      EMBEDDING_DIMENSIONS: "${EMBEDDING_DIMENSIONS:-64}"
      RERANK_PROVIDER: "${RERANK_PROVIDER:-local}"
      LLM_PROVIDER: "${LLM_PROVIDER:-endpoint}"
      LLM_API_BASE_URL: "${LLM_API_BASE_URL:-http://localhost:8001/v1}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-}"
      LLM_ENDPOINT_COMPATIBILITY: "${LLM_ENDPOINT_COMPATIBILITY:-openai}"
      LLM_TIMEOUT_SECONDS: "${LLM_TIMEOUT_SECONDS:-60}"
      LLM_MAX_RETRIES: "${LLM_MAX_RETRIES:-1}"
      LLM_RETRY_BACKOFF_SECONDS: "${LLM_RETRY_BACKOFF_SECONDS:-0.2}"
      LLM_FALLBACK_PROVIDER: "${LLM_FALLBACK_PROVIDER:-ollama}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen2.5:3b}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      TZ: "${TZ:-Asia/Ho_Chi_Minh}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import socket; socket.create_connection(('rabbitmq', 5672), 5).close()\""
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      TZ: "${TZ:-Asia/Ho_Chi_Minh}"
    expose:
      - "5173"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB is required}"
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER is required}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      TZ: "${TZ:-Asia/Ho_Chi_Minh}"
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${LOCAL_BIND_IP:?LOCAL_BIND_IP is required}:${ADMINER_PORT:?ADMINER_PORT is required}:8080"
    networks:
      - public
      - internal

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  redisinsight:
    image: redis/redisinsight:latest
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${LOCAL_BIND_IP:?LOCAL_BIND_IP is required}:${REDIS_INSIGHT_PORT:?REDIS_INSIGHT_PORT is required}:5540"
    volumes:
      - redisinsight_data:/data
    networks:
      - public
      - internal

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER:?RABBITMQ_USER is required}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}"
    expose:
      - "5672"
    ports:
      - "${LOCAL_BIND_IP:?LOCAL_BIND_IP is required}:${RABBITMQ_MANAGEMENT_PORT:?RABBITMQ_MANAGEMENT_PORT is required}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - public
      - internal
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}"
    expose:
      - "9000"
    ports:
      - "${LOCAL_BIND_IP:?LOCAL_BIND_IP is required}:${MINIO_CONSOLE_PORT:?MINIO_CONSOLE_PORT is required}:9001"
    volumes:
      - minio_data:/data
    networks:
      - public
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}"
      MINIO_BUCKET: "${MINIO_BUCKET:?MINIO_BUCKET is required}"
      MILVUS_BUCKET: "${MILVUS_BUCKET:?MILVUS_BUCKET is required}"
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "mc alias set local http://minio:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\" &&
      mc mb --ignore-existing \"local/$${MINIO_BUCKET}\" &&
      mc mb --ignore-existing \"local/$${MILVUS_BUCKET}\""
    networks:
      - internal
    restart: "no"

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    command:
      - etcd
      - --advertise-client-urls=http://127.0.0.1:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    expose:
      - "2379"
    volumes:
      - etcd_data:/etcd
    networks:
      - internal
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  milvus:
    image: milvusdb/milvus:v2.5.4
    command: ["milvus", "run", "standalone"]
    depends_on:
      etcd:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      ETCD_ENDPOINTS: "etcd:2379"
      MINIO_ADDRESS: "minio:9000"
      MINIO_ACCESS_KEY_ID: "${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}"
      MINIO_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}"
      MINIO_BUCKET_NAME: "${MILVUS_BUCKET:?MILVUS_BUCKET is required}"
      MINIO_USE_SSL: "false"
    expose:
      - "19530"
      - "9091"
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  prometheus:
    image: prom/prometheus:v3.0.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "${LOCAL_BIND_IP:?LOCAL_BIND_IP is required}:${PROMETHEUS_PORT:?PROMETHEUS_PORT is required}:9090"
    volumes:
      - ./infras/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - public
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  public:
  internal:

volumes:
  postgres_data:
  redis_data:
  redisinsight_data:
  rabbitmq_data:
  minio_data:
  etcd_data:
  milvus_data:
  prometheus_data:
