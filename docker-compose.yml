services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${APP_BIND_IP:?APP_BIND_IP is required}:${NGINX_PORT:?NGINX_PORT is required}:80"
    volumes:
      - ./infras/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    expose:
      - "8081"
    networks:
      - public
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_NAME: "${APP_NAME:-Omnicall API}"
      APP_ENV: "${APP_ENV:-local}"
      API_PREFIX: "${API_PREFIX:-/api}"
      CORS_ORIGINS: "${CORS_ORIGINS:-[]}"
      POSTGRES_HOST: "${POSTGRES_HOST:-postgres}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB is required}"
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER is required}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      REDIS_HOST: "${REDIS_HOST:-redis}"
      REDIS_PORT: "${REDIS_PORT:-6379}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
      REDIS_PROCESSING_LOCK_TTL_SECONDS: "${REDIS_PROCESSING_LOCK_TTL_SECONDS:-900}"
      RABBITMQ_HOST: "${RABBITMQ_HOST:-rabbitmq}"
      RABBITMQ_PORT: "${RABBITMQ_PORT:-5672}"
      RABBITMQ_USER: "${RABBITMQ_USER:?RABBITMQ_USER is required}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}"
      MINIO_HOST: "${MINIO_HOST:-minio}"
      MINIO_PORT: "${MINIO_PORT:-9000}"
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}"
      MINIO_BUCKET: "${MINIO_BUCKET:?MINIO_BUCKET is required}"
      MINIO_SECURE: "${MINIO_SECURE:-false}"
      MILVUS_HOST: "${MILVUS_HOST:-milvus}"
      MILVUS_PORT: "${MILVUS_PORT:-19530}"
      MILVUS_COLLECTION: "${MILVUS_COLLECTION:-meeting_chunks}"
      VECTOR_PROVIDER: "${VECTOR_PROVIDER:-milvus}"
      UPLOAD_MAX_BYTES: "${UPLOAD_MAX_BYTES:-524288000}"
      UPLOAD_ALLOWED_EXTENSIONS: "${UPLOAD_ALLOWED_EXTENSIONS:-[\".aac\",\".m4a\",\".mp3\",\".mp4\",\".wav\",\".webm\"]}"
      UPLOAD_ALLOWED_CONTENT_TYPES: "${UPLOAD_ALLOWED_CONTENT_TYPES:-[\"audio/aac\",\"audio/m4a\",\"audio/mpeg\",\"audio/mp4\",\"audio/wav\",\"audio/webm\",\"video/mp4\",\"video/webm\"]}"
      PROMETHEUS_URL: "${PROMETHEUS_URL:-http://prometheus:9090}"
      ADMIN_METRICS_CACHE_KEY: "${ADMIN_METRICS_CACHE_KEY:-admin:metrics:snapshot}"
      ADMIN_METRICS_CACHE_TTL_SECONDS: "${ADMIN_METRICS_CACHE_TTL_SECONDS:-10}"
      OPERATIONAL_LOG_STREAM_KEY: "${OPERATIONAL_LOG_STREAM_KEY:-admin:logs:operational}"
      OPERATIONAL_LOG_MAX_LENGTH: "${OPERATIONAL_LOG_MAX_LENGTH:-1000}"
      OPERATIONAL_LOG_TTL_SECONDS: "${OPERATIONAL_LOG_TTL_SECONDS:-86400}"
      OPERATIONAL_LOG_DEFAULT_TAIL: "${OPERATIONAL_LOG_DEFAULT_TAIL:-100}"
      AUTH_SESSION_TTL_HOURS: "${AUTH_SESSION_TTL_HOURS:-168}"
      RATE_LIMIT_ENABLED: "${RATE_LIMIT_ENABLED:-true}"
      RATE_LIMIT_AUTH_PER_MINUTE: "${RATE_LIMIT_AUTH_PER_MINUTE:-20}"
      RATE_LIMIT_MEETINGS_PER_MINUTE: "${RATE_LIMIT_MEETINGS_PER_MINUTE:-300}"
      RATE_LIMIT_ADMIN_PER_MINUTE: "${RATE_LIMIT_ADMIN_PER_MINUTE:-180}"
      RATE_LIMIT_PUBLIC_PER_MINUTE: "${RATE_LIMIT_PUBLIC_PER_MINUTE:-10}"
      CONCURRENCY_LIMIT_PER_ACCOUNT: "${CONCURRENCY_LIMIT_PER_ACCOUNT:-5}"
      CONCURRENCY_LIMIT_MEETINGS: "${CONCURRENCY_LIMIT_MEETINGS:-5}"
      CONCURRENCY_LIMIT_ADMIN: "${CONCURRENCY_LIMIT_ADMIN:-3}"
      CONCURRENCY_LIMIT_AUTH: "${CONCURRENCY_LIMIT_AUTH:-3}"
      TASK_LIMIT_PER_MEETING: "${TASK_LIMIT_PER_MEETING:-2}"
      TASK_LIMIT_PER_USER: "${TASK_LIMIT_PER_USER:-5}"
      CIRCUIT_BREAKER_ENABLED: "${CIRCUIT_BREAKER_ENABLED:-true}"
      CIRCUIT_BREAKER_FAILURE_THRESHOLD: "${CIRCUIT_BREAKER_FAILURE_THRESHOLD:-5}"
      CIRCUIT_BREAKER_RECOVERY_SECONDS: "${CIRCUIT_BREAKER_RECOVERY_SECONDS:-30}"
      VAD_MIN_SPEECH_MS: "${VAD_MIN_SPEECH_MS:-300}"
      VAD_SILENCE_GAP_MS: "${VAD_SILENCE_GAP_MS:-500}"
      VAD_ENERGY_THRESHOLD: "${VAD_ENERGY_THRESHOLD:-0.012}"
      ASR_TIMEOUT_SECONDS: "${ASR_TIMEOUT_SECONDS:-120}"
      ASR_TIMEOUT_REALTIME_FACTOR: "${ASR_TIMEOUT_REALTIME_FACTOR:-1.0}"
      ASR_MODEL: "${ASR_MODEL:-whisper-medium}"
      ASR_COMPUTE_TYPE: "${ASR_COMPUTE_TYPE:-int8}"
      ASR_BEAM_SIZE: "${ASR_BEAM_SIZE:-5}"
      ASR_LANGUAGE: "${ASR_LANGUAGE:-auto}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-nomic-embed-text}"
      EMBEDDING_DIMENSIONS: "${EMBEDDING_DIMENSIONS:-768}"
      EMBEDDING_TIMEOUT_SECONDS: "${EMBEDDING_TIMEOUT_SECONDS:-30}"
      EMBEDDING_BATCH_SIZE: "${EMBEDDING_BATCH_SIZE:-16}"
      EMBEDDING_MAX_RETRIES: "${EMBEDDING_MAX_RETRIES:-2}"
      EMBEDDING_RETRY_BACKOFF_SECONDS: "${EMBEDDING_RETRY_BACKOFF_SECONDS:-0.2}"
      EMBEDDING_CONTRACT_VERSION: "${EMBEDDING_CONTRACT_VERSION:-v1}"
      RERANK_TOP_K: "${RERANK_TOP_K:-12}"
      RERANK_OUTPUT_K: "${RERANK_OUTPUT_K:-6}"
      RERANK_TIMEOUT_SECONDS: "${RERANK_TIMEOUT_SECONDS:-30}"
      RETRIEVAL_FALLBACK_CANDIDATE_LIMIT: "${RETRIEVAL_FALLBACK_CANDIDATE_LIMIT:-48}"
      RETRIEVAL_TRIGRAM_THRESHOLD: "${RETRIEVAL_TRIGRAM_THRESHOLD:-0.12}"
      GUARDRAIL_MODEL: "${GUARDRAIL_MODEL:-llama-guard3:1b}"
      GUARDRAIL_TIMEOUT_SECONDS: "${GUARDRAIL_TIMEOUT_SECONDS:-20}"
      GUARDRAIL_MAX_RETRIES: "${GUARDRAIL_MAX_RETRIES:-0}"
      GUARDRAIL_INPUT_ENABLED: "${GUARDRAIL_INPUT_ENABLED:-true}"
      GUARDRAIL_OUTPUT_ENABLED: "${GUARDRAIL_OUTPUT_ENABLED:-true}"
      GUARDRAIL_STRICT_MODE: "${GUARDRAIL_STRICT_MODE:-false}"
      GUARDRAIL_INPUT_STRICT_MODE: "${GUARDRAIL_INPUT_STRICT_MODE:-}"
      GUARDRAIL_OUTPUT_STRICT_MODE: "${GUARDRAIL_OUTPUT_STRICT_MODE:-}"
      GUARDRAIL_LATENCY_BUDGET_MS: "${GUARDRAIL_LATENCY_BUDGET_MS:-8000}"
      GUARDRAIL_PII_REDACTION_ENABLED: "${GUARDRAIL_PII_REDACTION_ENABLED:-true}"
      LLM_PROVIDER: "${LLM_PROVIDER:-endpoint}"
      LLM_API_BASE_URL: "${LLM_API_BASE_URL:-http://localhost:8001/v1}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-}"
      LLM_ENDPOINT_COMPATIBILITY: "${LLM_ENDPOINT_COMPATIBILITY:-openai}"
      LLM_TIMEOUT_SECONDS: "${LLM_TIMEOUT_SECONDS:-60}"
      LLM_MAX_RETRIES: "${LLM_MAX_RETRIES:-1}"
      LLM_RETRY_BACKOFF_SECONDS: "${LLM_RETRY_BACKOFF_SECONDS:-0.2}"
      LLM_FALLBACK_PROVIDER: "${LLM_FALLBACK_PROVIDER:-ollama}"
      AGENTIC_RAG_MAX_ITERATIONS: "${AGENTIC_RAG_MAX_ITERATIONS:-2}"
      AGENTIC_RAG_MAX_REPLANS: "${AGENTIC_RAG_MAX_REPLANS:-1}"
      AGENTIC_RAG_MAX_TOOL_CALLS_PER_ITERATION: "${AGENTIC_RAG_MAX_TOOL_CALLS_PER_ITERATION:-4}"
      AGENTIC_RAG_MAX_CHUNKS_PER_TOOL: "${AGENTIC_RAG_MAX_CHUNKS_PER_TOOL:-5}"
      AGENTIC_RAG_MAX_TOTAL_CHUNKS: "${AGENTIC_RAG_MAX_TOTAL_CHUNKS:-12}"
      AGENTIC_RAG_ITERATION_TIMEOUT_SECONDS: "${AGENTIC_RAG_ITERATION_TIMEOUT_SECONDS:-30.0}"
      AGENTIC_RAG_TOTAL_TIMEOUT_SECONDS: "${AGENTIC_RAG_TOTAL_TIMEOUT_SECONDS:-60.0}"
      AGENTIC_RAG_MAX_CONTEXT_TOKENS: "${AGENTIC_RAG_MAX_CONTEXT_TOKENS:-4000}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://ollama:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen2.5:1.5b}"
      OLLAMA_LLM_TIMEOUT_SECONDS: "${OLLAMA_LLM_TIMEOUT_SECONDS:-600}"
      OLLAMA_CONTEXT_LENGTH: "${OLLAMA_CONTEXT_LENGTH:-8192}"
      EXTRACTION_WINDOW_TARGET_TOKENS: "${EXTRACTION_WINDOW_TARGET_TOKENS:-2000}"
      EXTRACTION_WINDOW_HARD_LIMIT_TOKENS: "${EXTRACTION_WINDOW_HARD_LIMIT_TOKENS:-2800}"
      EXTRACTION_WINDOW_OVERLAP_SEGMENTS: "${EXTRACTION_WINDOW_OVERLAP_SEGMENTS:-1}"
      EXTRACTION_WINDOW_MAX_WORKERS: "${EXTRACTION_WINDOW_MAX_WORKERS:-4}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      TZ: "${TZ:-Asia/Ho_Chi_Minh}"
    expose:
      - "8000"
    depends_on:
      ollama-init:
        condition: service_completed_successfully
      model-init:
        condition: service_completed_successfully
    volumes:
      - model_cache:/models
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import json,urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8000/api/health')); assert data['status']=='ok'\""
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command:
      [
        "celery",
        "-A",
        "backend.configs.celery_app.celery_app",
        "worker",
        "--loglevel=INFO",
        "--queues=meeting-processing,processing-maintenance,chat-processing",
        "--concurrency=1",
        "--hostname=worker@%h",
        "--without-gossip",
        "--without-mingle"
      ]
    environment:
      APP_NAME: "${APP_NAME:-Omnicall API}"
      APP_ENV: "${APP_ENV:-local}"
      API_PREFIX: "${API_PREFIX:-/api}"
      CORS_ORIGINS: "${CORS_ORIGINS:-[]}"
      POSTGRES_HOST: "${POSTGRES_HOST:-postgres}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB is required}"
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER is required}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      REDIS_HOST: "${REDIS_HOST:-redis}"
      REDIS_PORT: "${REDIS_PORT:-6379}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
      REDIS_PROCESSING_LOCK_TTL_SECONDS: "${REDIS_PROCESSING_LOCK_TTL_SECONDS:-900}"
      OPERATIONAL_LOG_STREAM_KEY: "${OPERATIONAL_LOG_STREAM_KEY:-admin:logs:operational}"
      OPERATIONAL_LOG_MAX_LENGTH: "${OPERATIONAL_LOG_MAX_LENGTH:-1000}"
      OPERATIONAL_LOG_TTL_SECONDS: "${OPERATIONAL_LOG_TTL_SECONDS:-86400}"
      OPERATIONAL_LOG_DEFAULT_TAIL: "${OPERATIONAL_LOG_DEFAULT_TAIL:-100}"
      RABBITMQ_HOST: "${RABBITMQ_HOST:-rabbitmq}"
      RABBITMQ_PORT: "${RABBITMQ_PORT:-5672}"
      RABBITMQ_USER: "${RABBITMQ_USER:?RABBITMQ_USER is required}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}"
      PROCESSING_RECONCILIATION_INTERVAL_SECONDS: "${PROCESSING_RECONCILIATION_INTERVAL_SECONDS:-60}"
      PROCESSING_RECONCILIATION_STALE_SECONDS: "${PROCESSING_RECONCILIATION_STALE_SECONDS:-120}"
      PROCESSING_RECONCILIATION_BATCH_SIZE: "${PROCESSING_RECONCILIATION_BATCH_SIZE:-100}"
      RATE_LIMIT_ENABLED: "${RATE_LIMIT_ENABLED:-true}"
      RATE_LIMIT_AUTH_PER_MINUTE: "${RATE_LIMIT_AUTH_PER_MINUTE:-20}"
      RATE_LIMIT_MEETINGS_PER_MINUTE: "${RATE_LIMIT_MEETINGS_PER_MINUTE:-300}"
      RATE_LIMIT_ADMIN_PER_MINUTE: "${RATE_LIMIT_ADMIN_PER_MINUTE:-180}"
      RATE_LIMIT_PUBLIC_PER_MINUTE: "${RATE_LIMIT_PUBLIC_PER_MINUTE:-10}"
      CONCURRENCY_LIMIT_PER_ACCOUNT: "${CONCURRENCY_LIMIT_PER_ACCOUNT:-5}"
      CONCURRENCY_LIMIT_MEETINGS: "${CONCURRENCY_LIMIT_MEETINGS:-5}"
      CONCURRENCY_LIMIT_ADMIN: "${CONCURRENCY_LIMIT_ADMIN:-3}"
      CONCURRENCY_LIMIT_AUTH: "${CONCURRENCY_LIMIT_AUTH:-3}"
      TASK_LIMIT_PER_MEETING: "${TASK_LIMIT_PER_MEETING:-2}"
      TASK_LIMIT_PER_USER: "${TASK_LIMIT_PER_USER:-5}"
      CIRCUIT_BREAKER_ENABLED: "${CIRCUIT_BREAKER_ENABLED:-true}"
      CIRCUIT_BREAKER_FAILURE_THRESHOLD: "${CIRCUIT_BREAKER_FAILURE_THRESHOLD:-5}"
      CIRCUIT_BREAKER_RECOVERY_SECONDS: "${CIRCUIT_BREAKER_RECOVERY_SECONDS:-30}"
      MINIO_HOST: "${MINIO_HOST:-minio}"
      MINIO_PORT: "${MINIO_PORT:-9000}"
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}"
      MINIO_BUCKET: "${MINIO_BUCKET:?MINIO_BUCKET is required}"
      MINIO_SECURE: "${MINIO_SECURE:-false}"
      MILVUS_HOST: "${MILVUS_HOST:-milvus}"
      MILVUS_PORT: "${MILVUS_PORT:-19530}"
      MILVUS_COLLECTION: "${MILVUS_COLLECTION:-meeting_chunks}"
      VECTOR_PROVIDER: "${VECTOR_PROVIDER:-milvus}"
      VAD_MIN_SPEECH_MS: "${VAD_MIN_SPEECH_MS:-300}"
      VAD_SILENCE_GAP_MS: "${VAD_SILENCE_GAP_MS:-500}"
      VAD_ENERGY_THRESHOLD: "${VAD_ENERGY_THRESHOLD:-0.012}"
      ASR_TIMEOUT_SECONDS: "${ASR_TIMEOUT_SECONDS:-120}"
      ASR_TIMEOUT_REALTIME_FACTOR: "${ASR_TIMEOUT_REALTIME_FACTOR:-1.0}"
      ASR_MODEL: "${ASR_MODEL:-whisper-medium}"
      ASR_COMPUTE_TYPE: "${ASR_COMPUTE_TYPE:-int8}"
      ASR_BEAM_SIZE: "${ASR_BEAM_SIZE:-5}"
      ASR_LANGUAGE: "${ASR_LANGUAGE:-auto}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-nomic-embed-text}"
      EMBEDDING_DIMENSIONS: "${EMBEDDING_DIMENSIONS:-768}"
      EMBEDDING_TIMEOUT_SECONDS: "${EMBEDDING_TIMEOUT_SECONDS:-30}"
      EMBEDDING_BATCH_SIZE: "${EMBEDDING_BATCH_SIZE:-16}"
      EMBEDDING_MAX_RETRIES: "${EMBEDDING_MAX_RETRIES:-2}"
      EMBEDDING_RETRY_BACKOFF_SECONDS: "${EMBEDDING_RETRY_BACKOFF_SECONDS:-0.2}"
      EMBEDDING_CONTRACT_VERSION: "${EMBEDDING_CONTRACT_VERSION:-v1}"
      RERANK_TOP_K: "${RERANK_TOP_K:-12}"
      RERANK_OUTPUT_K: "${RERANK_OUTPUT_K:-6}"
      RERANK_TIMEOUT_SECONDS: "${RERANK_TIMEOUT_SECONDS:-30}"
      RETRIEVAL_FALLBACK_CANDIDATE_LIMIT: "${RETRIEVAL_FALLBACK_CANDIDATE_LIMIT:-48}"
      RETRIEVAL_TRIGRAM_THRESHOLD: "${RETRIEVAL_TRIGRAM_THRESHOLD:-0.12}"
      GUARDRAIL_MODEL: "${GUARDRAIL_MODEL:-llama-guard3:1b}"
      GUARDRAIL_TIMEOUT_SECONDS: "${GUARDRAIL_TIMEOUT_SECONDS:-20}"
      GUARDRAIL_MAX_RETRIES: "${GUARDRAIL_MAX_RETRIES:-0}"
      GUARDRAIL_INPUT_ENABLED: "${GUARDRAIL_INPUT_ENABLED:-true}"
      GUARDRAIL_OUTPUT_ENABLED: "${GUARDRAIL_OUTPUT_ENABLED:-true}"
      GUARDRAIL_STRICT_MODE: "${GUARDRAIL_STRICT_MODE:-false}"
      GUARDRAIL_INPUT_STRICT_MODE: "${GUARDRAIL_INPUT_STRICT_MODE:-}"
      GUARDRAIL_OUTPUT_STRICT_MODE: "${GUARDRAIL_OUTPUT_STRICT_MODE:-}"
      GUARDRAIL_LATENCY_BUDGET_MS: "${GUARDRAIL_LATENCY_BUDGET_MS:-8000}"
      GUARDRAIL_PII_REDACTION_ENABLED: "${GUARDRAIL_PII_REDACTION_ENABLED:-true}"
      LLM_PROVIDER: "${LLM_PROVIDER:-endpoint}"
      LLM_API_BASE_URL: "${LLM_API_BASE_URL:-http://localhost:8001/v1}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-}"
      LLM_ENDPOINT_COMPATIBILITY: "${LLM_ENDPOINT_COMPATIBILITY:-openai}"
      LLM_TIMEOUT_SECONDS: "${LLM_TIMEOUT_SECONDS:-60}"
      LLM_MAX_RETRIES: "${LLM_MAX_RETRIES:-1}"
      LLM_RETRY_BACKOFF_SECONDS: "${LLM_RETRY_BACKOFF_SECONDS:-0.2}"
      LLM_FALLBACK_PROVIDER: "${LLM_FALLBACK_PROVIDER:-ollama}"
      AGENTIC_RAG_MAX_ITERATIONS: "${AGENTIC_RAG_MAX_ITERATIONS:-2}"
      AGENTIC_RAG_MAX_REPLANS: "${AGENTIC_RAG_MAX_REPLANS:-1}"
      AGENTIC_RAG_MAX_TOOL_CALLS_PER_ITERATION: "${AGENTIC_RAG_MAX_TOOL_CALLS_PER_ITERATION:-4}"
      AGENTIC_RAG_MAX_CHUNKS_PER_TOOL: "${AGENTIC_RAG_MAX_CHUNKS_PER_TOOL:-5}"
      AGENTIC_RAG_MAX_TOTAL_CHUNKS: "${AGENTIC_RAG_MAX_TOTAL_CHUNKS:-12}"
      AGENTIC_RAG_ITERATION_TIMEOUT_SECONDS: "${AGENTIC_RAG_ITERATION_TIMEOUT_SECONDS:-30.0}"
      AGENTIC_RAG_TOTAL_TIMEOUT_SECONDS: "${AGENTIC_RAG_TOTAL_TIMEOUT_SECONDS:-60.0}"
      AGENTIC_RAG_MAX_CONTEXT_TOKENS: "${AGENTIC_RAG_MAX_CONTEXT_TOKENS:-4000}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://ollama:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen2.5:1.5b}"
      OLLAMA_LLM_TIMEOUT_SECONDS: "${OLLAMA_LLM_TIMEOUT_SECONDS:-600}"
      OLLAMA_CONTEXT_LENGTH: "${OLLAMA_CONTEXT_LENGTH:-8192}"
      EXTRACTION_WINDOW_TARGET_TOKENS: "${EXTRACTION_WINDOW_TARGET_TOKENS:-2000}"
      EXTRACTION_WINDOW_HARD_LIMIT_TOKENS: "${EXTRACTION_WINDOW_HARD_LIMIT_TOKENS:-2800}"
      EXTRACTION_WINDOW_OVERLAP_SEGMENTS: "${EXTRACTION_WINDOW_OVERLAP_SEGMENTS:-1}"
      EXTRACTION_WINDOW_MAX_WORKERS: "${EXTRACTION_WINDOW_MAX_WORKERS:-4}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      TZ: "${TZ:-Asia/Ho_Chi_Minh}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
      model-init:
        condition: service_completed_successfully
    volumes:
      - model_cache:/models
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A backend.configs.celery_app.celery_app inspect ping --destination worker@$$HOSTNAME --timeout=5 | grep -q pong"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command:
      [
        "celery",
        "-A",
        "backend.configs.celery_app.celery_app",
        "beat",
        "--loglevel=INFO",
        "--pidfile=/tmp/celerybeat.pid",
        "--schedule=/tmp/celerybeat-schedule"
      ]
    environment:
      RABBITMQ_HOST: "${RABBITMQ_HOST:-rabbitmq}"
      RABBITMQ_PORT: "${RABBITMQ_PORT:-5672}"
      RABBITMQ_USER: "${RABBITMQ_USER:?RABBITMQ_USER is required}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}"
      PROCESSING_RECONCILIATION_INTERVAL_SECONDS: "${PROCESSING_RECONCILIATION_INTERVAL_SECONDS:-60}"
      PROCESSING_RECONCILIATION_STALE_SECONDS: "${PROCESSING_RECONCILIATION_STALE_SECONDS:-120}"
      PROCESSING_RECONCILIATION_BATCH_SIZE: "${PROCESSING_RECONCILIATION_BATCH_SIZE:-100}"
      TZ: "${TZ:-Asia/Ho_Chi_Minh}"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os; pid=int(open('/tmp/celerybeat.pid').read().strip()); os.kill(pid, 0)\""
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  ollama:
    image: ollama/ollama:latest
    expose:
      - "11434"
    ports:
      - "${LOCAL_BIND_IP:?LOCAL_BIND_IP is required}:${OLLAMA_PORT:?OLLAMA_PORT is required}:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - internal
      - public
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "${OLLAMA_BASE_URL:-http://ollama:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen2.5:1.5b}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-nomic-embed-text}"
      GUARDRAIL_MODEL: "${GUARDRAIL_MODEL:-llama-guard3:1b}"
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "set -eu;
      for model in "$${OLLAMA_MODEL}" "$${EMBEDDING_MODEL}" "$${GUARDRAIL_MODEL}"; do
        echo \"Pulling Ollama model: $${model}\";
        ollama pull \"$${model}\";
      done"
    networks:
      - internal
    restart: "no"

  model-init:
    build:
      context: .
      dockerfile: infras/model-init/Dockerfile
    volumes:
      - model_cache:/models
    networks:
      - internal
    restart: "no"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      TZ: "${TZ:-Asia/Ho_Chi_Minh}"
    expose:
      - "5173"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres:
    image: postgres:17-alpine
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    environment:
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB is required}"
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER is required}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      TZ: "${TZ:-Asia/Ho_Chi_Minh}"
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infras/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./infras/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${LOCAL_BIND_IP:?LOCAL_BIND_IP is required}:${ADMINER_PORT:?ADMINER_PORT is required}:8080"
    networks:
      - public
      - internal

  redis:
    image: redis:7-alpine
    command:
      [
        "redis-server",
        "/etc/redis/redis.conf",
        "--requirepass",
        "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
      ]
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
    expose:
      - "6379"
    volumes:
      - redis_data:/data
      - ./infras/redis/redis.conf:/etc/redis/redis.conf:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  redisinsight:
    image: redis/redisinsight:latest
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${LOCAL_BIND_IP:?LOCAL_BIND_IP is required}:${REDIS_INSIGHT_PORT:?REDIS_INSIGHT_PORT is required}:5540"
    volumes:
      - redisinsight_data:/data
    networks:
      - public
      - internal

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER:?RABBITMQ_USER is required}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}"
    expose:
      - "5672"
      - "15692"
    ports:
      - "${LOCAL_BIND_IP:?LOCAL_BIND_IP is required}:${RABBITMQ_MANAGEMENT_PORT:?RABBITMQ_MANAGEMENT_PORT is required}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infras/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./infras/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    networks:
      - public
      - internal
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}"
      MINIO_PROMETHEUS_AUTH_TYPE: "public"
    expose:
      - "9000"
    ports:
      - "${LOCAL_BIND_IP:?LOCAL_BIND_IP is required}:${MINIO_CONSOLE_PORT:?MINIO_CONSOLE_PORT is required}:9001"
    volumes:
      - minio_data:/data
    networks:
      - public
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    command: ["etcd", "--config-file", "/etc/etcd/etcd.conf.yml"]
    expose:
      - "2379"
      - "2380"
    volumes:
      - etcd_data:/etcd
      - ./infras/etcd/etcd.conf.yml:/etc/etcd/etcd.conf.yml:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  milvus:
    image: milvusdb/milvus:v2.5.4
    command: ["milvus", "run", "standalone"]
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ETCD_ENDPOINTS: "etcd:2379"
      MINIO_ADDRESS: "minio:9000"
      MINIO_ACCESS_KEY_ID: "${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}"
      MINIO_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}"
      MINIO_BUCKET_NAME: "${MILVUS_BUCKET:?MILVUS_BUCKET is required}"
      MINIO_USE_SSL: "false"
    expose:
      - "19530"
      - "9091"
    ports:
      - "${LOCAL_BIND_IP:?LOCAL_BIND_IP is required}:${MILVUS_WEBUI_PORT:?MILVUS_WEBUI_PORT is required}:9091"
    volumes:
      - milvus_data:/var/lib/milvus
      - ./infras/milvus/user.yaml:/milvus/configs/user.yaml:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  docker-exporter:
    image: python:3.12-alpine
    command: ["python", "/app/exporter.py"]
    expose:
      - "9104"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infras/docker-exporter/exporter.py:/app/exporter.py:ro
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; assert urllib.request.urlopen('http://127.0.0.1:9104/health', timeout=3).read().strip()==b'ok'\""
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 5s

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}?sslmode=disable"
    expose:
      - "9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9187/metrics >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    command:
      - "--redis.addr=redis://redis:6379"
      - "--redis.password=${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
    expose:
      - "9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.4.0
    command:
      - "--nginx.scrape-uri=http://nginx:8081/nginx_status"
    expose:
      - "9113"
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - internal

  prometheus:
    image: prom/prometheus:v3.0.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "${LOCAL_BIND_IP:?LOCAL_BIND_IP is required}:${PROMETHEUS_PORT:?PROMETHEUS_PORT is required}:9090"
    volumes:
      - ./infras/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - public
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  public:
  internal:

volumes:
  postgres_data:
  redis_data:
  redisinsight_data:
  rabbitmq_data:
  minio_data:
  etcd_data:
  milvus_data:
  prometheus_data:
  ollama_data:
  model_cache:
